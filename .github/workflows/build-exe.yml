name: Build Windows EXE

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '.github/workflows/build-exe.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Create venv
        run: |
          python -m venv .venv
      
      - name: Install dependencies
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install pyinstaller==6.19.0

      - name: Remove incompatible backport packages
        run: |
          $packages = @("typing", "pandas")
          foreach ($pkg in $packages) {
            .\.venv\Scripts\python.exe -m pip uninstall -y $pkg
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Package '$pkg' not installed or already removed, continue."
              $global:LASTEXITCODE = 0
            }
          }
          exit 0
      
      - name: Build EXE
        run: |
          .\.venv\Scripts\python.exe -m PyInstaller --name AirBarAudioSeparator `
            --onedir `
            --windowed `
            --collect-data resemblyzer `
            --collect-submodules torch `
            --add-data "background.jpg;." `
            --add-data "ok;ok" `
            --exclude-module pandas `
            --exclude-module matplotlib `
            --exclude-module jupyter `
            --exclude-module IPython `
            gui_resemblyzer.py

      - name: Verify packaged files
        run: |
          if (-not (Test-Path "dist/AirBarAudioSeparator/background.jpg")) {
            throw "background.jpg was not packaged"
          }
          if (-not (Test-Path "dist/AirBarAudioSeparator/ok")) {
            throw "ok folder was not packaged"
          }
          Write-Host "Packaged assets verified."
      
      - name: Clean up build files
        run: |
          Remove-Item -Force -Path "AirBarAudioSeparator.spec" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force -Path "build" -ErrorAction SilentlyContinue
      
      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/AirBarAudioSeparator -DestinationPath dist/AirBarAudioSeparator.zip -Force
          Write-Output "ZIP 压缩完成"
          Get-Item dist/AirBarAudioSeparator.zip | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirBarAudioSeparator-exe
          path: dist/AirBarAudioSeparator/
          retention-days: 7
      
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirBarAudioSeparator-zip
          path: dist/AirBarAudioSeparator.zip
          retention-days: 7
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/AirBarAudioSeparator.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
